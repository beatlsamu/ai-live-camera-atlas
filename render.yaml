services:
  - type: web
    name: ai-live-camera-atlas-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: FRONTEND_ORIGIN
        value: https://your-frontend.onrender.com
      - key: ROTATION_SECONDS
        value: "30"
      - key: VISION_PROVIDER
        value: mock
      - key: LLM_PROVIDER
        value: mock
      - key: VISION_API_URL
        value: ""
      - key: LLM_API_URL
        value: ""
      - key: VISION_API_KEY
        sync: false
      - key: LLM_API_KEY
        sync: false

  - type: web
    name: ai-live-camera-atlas-web
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run preview -- --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://your-backend.onrender.com
