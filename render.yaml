services:
  - type: web
    name: ai-live-camera-atlas
    env: python
    rootDir: backend
    buildCommand: >
      cd ../frontend && npm install && npm run build && cd ../backend &&
      pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: FRONTEND_DIST_PATH
        value: ../frontend/dist
      - key: ROTATION_SECONDS
        value: "30"
      - key: VISION_PROVIDER
        value: nvidia
      - key: LLM_PROVIDER
        value: nvidia
      - key: NVIDIA_VISION_MODEL
        value: google/paligemma
      - key: NVIDIA_LLM_MODEL
        value: meta/llama-3.1-8b-instruct
      - key: VISION_API_URL
        value: https://ai.api.nvidia.com/v1/vlm/google/paligemma
      - key: LLM_API_URL
        value: https://integrate.api.nvidia.com/v1/chat/completions
      - key: NVIDIA_API_KEY
        sync: false